{% extends 'base.html' %}

{% block content %}

<style>

/* PROFILE CARD */

.profile-container{
background:white;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
max-width:900px;
margin:40px auto;
overflow:hidden;
}

/* HEADER */

.profile-header{
background:#212529;
color:#ffc107;
padding:30px;
text-align:center;
}

.profile-header h2{
font-weight:700;
}

.profile-header p{
color:#ddd;
}

/* FORM AREA */

.profile-body{
padding:40px;
}

/* SECTION TITLE */

.section-title{
font-weight:700;
color:#ffc107;
margin-top:20px;
margin-bottom:15px;
border-bottom:2px solid #f1f1f1;
padding-bottom:6px;
}

/* INPUT */

.form-control{
border-radius:10px;
border:2px solid #eee;
padding:10px 12px;
font-size:15px;
transition:0.3s;
}

.form-control:focus{
border-color:#ffc107;
box-shadow:0 0 0 0.2rem rgba(255,193,7,0.25);
}

/* BUTTON */

.btn-save{
background:#ffc107;
border:none;
border-radius:10px;
padding:12px;
font-weight:600;
font-size:16px;
color:black;
}

.btn-save:hover{
background:#e0a800;
transform:translateY(-2px);
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* MOBILE */

@media(max-width:768px){

.profile-container{
margin:20px;
}

.profile-body{
padding:25px;
}

}

</style>

<div class="profile-container">

<div class="profile-header">

<h2>
<i class="bi bi-person-circle me-2"></i>
Manage Profile
</h2>

<p class="mb-0">Update your personal information</p>

</div>

<div class="profile-body">

{% if messages %}
{% for message in messages %}

<div class="alert alert-{{message.tags}} alert-dismissible fade show">
{{message}}
<button class="btn-close" data-bs-dismiss="alert"></button>
</div>
{% endfor %}
{% endif %}

<form method="POST">
{% csrf_token %}

<h5 class="section-title">
<i class="bi bi-person me-2"></i>Personal Details
</h5>

<div class="row g-3">

<div class="col-md-6">
<label class="form-label fw-bold">Username</label>
<input type="text" name="username" value="{{user.username}}" class="form-control">
</div>

<div class="col-md-6">
<label class="form-label fw-bold">Email</label>
<input type="email" name="email" value="{{user.email}}" class="form-control">
</div>

<div class="col-md-6">
<label class="form-label fw-bold">Phone</label>
<input type="text" name="phone" value="{{user.phone}}" class="form-control">
</div>

</div>

<h5 class="section-title">
<i class="bi bi-geo-alt-fill me-2"></i>Address
</h5>

<div class="row g-3">

<div class="col-md-6">
<label class="form-label fw-bold">House / Flat No</label>
<input type="text" name="house_no" value="{{user.house_no}}" class="form-control">
</div>

<div class="col-md-6">
<label class="form-label fw-bold">Street</label>
<input type="text" name="street" value="{{user.street}}" class="form-control">
</div>

<div class="col-md-6">
<label class="form-label fw-bold">City</label>
<input type="text" name="city" value="{{user.city}}" class="form-control">
</div>

<div class="col-md-6">
<label class="form-label fw-bold">State</label>
<input type="text" name="state" value="{{user.state}}" class="form-control">
</div>

<div class="col-md-6">
<label class="form-label fw-bold">Pincode</label>
<input type="text" name="pincode" value="{{user.pincode}}" class="form-control">
</div>

</div>

<div class="mt-4">

<button class="btn btn-save btn-lg w-100">
<i class="bi bi-save me-2"></i>Update Profile
</button>

</div>

</form>

</div>

</div>

{% endblock %}
