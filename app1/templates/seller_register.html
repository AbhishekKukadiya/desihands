{% extends 'base.html' %}

{% block content %}

<style>

.auth-container{
background:white;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
max-width:950px;
margin:40px auto;
overflow:hidden;
}

/* HEADER */

.auth-header{
background:#212529;
color:#ffc107;
padding:35px;
text-align:center;
}

.auth-header h3{
font-weight:700;
}

/* BODY */

.auth-body{
padding:40px;
}

/* SECTION */

.form-section{
background:#f8f9fa;
padding:20px;
border-radius:10px;
margin-bottom:25px;
}

.form-section-title{
font-weight:700;
color:#ffc107;
margin-bottom:15px;
border-bottom:2px solid #eee;
padding-bottom:6px;
}

/* INPUT */

.form-control{
border-radius:10px;
border:2px solid #eee;
padding:10px 12px;
transition:0.3s;
}

.form-control:focus{
border-color:#ffc107;
box-shadow:0 0 0 0.2rem rgba(255,193,7,0.25);
}

.input-group-text{
background:#f8f9fa;
border-right:none;
}

.form-control.with-icon{
border-left:none;
}

/* BUTTON */

.btn-warning{
background:#ffc107;
border:none;
color:black;
font-weight:600;
}

.btn-warning:hover{
background:#e0a800;
transform:translateY(-2px);
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* PASSWORD STRENGTH */

.strength-indicator{
height:5px;
border-radius:3px;
margin-top:5px;
}

.strength-weak{background:#dc3545;width:33%;}
.strength-medium{background:#ffc107;width:66%;}
.strength-strong{background:#28a745;width:100%;}

@media(max-width:768px){

.auth-container{
margin:20px;
}

.auth-body{
padding:25px;
}

}

</style>

<div class="container">

<div class="auth-container">

<div class="auth-header">

<h3>
<i class="bi bi-shop me-2"></i>
Become a Seller
</h3>

<p class="mb-0 text-light">
Start selling your handmade products
</p>

</div>

<div class="auth-body">

{% if messages %}
{% for message in messages %}
<div class="alert alert-{{message.tags}}">
{{message}}
</div>
{% endfor %}
{% endif %}

<form method="POST">

{% csrf_token %}

<!-- PERSONAL -->

<div class="form-section">

<div class="form-section-title">
<i class="bi bi-person-circle me-2"></i>
Personal Information
</div>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">Username</label>

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-person"></i>
</span>

<input type="text" name="username" class="form-control with-icon" required>

</div>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Email</label>

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-envelope"></i>
</span>

<input type="email" name="email" class="form-control with-icon" required>

</div>

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">Phone</label>

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-telephone"></i>
</span>

<input type="text" name="phone" class="form-control with-icon" required>

</div>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Business Name</label>

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-shop"></i>
</span>

<input type="text" name="business_name" class="form-control with-icon" required>

</div>

</div>

</div>

</div>

<!-- ADDRESS -->

<div class="form-section">

<div class="form-section-title">
<i class="bi bi-geo-alt me-2"></i>
Business Address
</div>

<div class="mb-3">

<label class="form-label">Address</label>

<textarea name="business_address" class="form-control" rows="3" required></textarea>

</div>

<div class="row">

<div class="col-md-4 mb-3">

<label class="form-label">City</label>

<input type="text" name="city" class="form-control" required>

</div>

<div class="col-md-4 mb-3">

<label class="form-label">State</label>

<input type="text" name="state" class="form-control" required>

</div>

<div class="col-md-4 mb-3">

<label class="form-label">Pincode</label>

<input type="text" name="pincode" class="form-control" required>

</div>

</div>

</div>

<!-- SECURITY -->

<div class="form-section">

<div class="form-section-title">
<i class="bi bi-shield-lock me-2"></i>
Security
</div>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">Password</label>

<input type="password" name="password" class="form-control" required>

<div class="strength-indicator"></div>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Confirm Password</label>

<input type="password" name="password2" class="form-control" required>

</div>

</div>

</div>

<div class="form-check mb-3">

<input class="form-check-input" type="checkbox" required>

<label class="form-check-label">
I agree to the Terms & Seller Agreement
</label>

</div>

<div class="d-grid">

<button type="submit" class="btn btn-warning btn-lg">
Register as Seller
</button>

</div>

</form>

<div class="text-center mt-4">

Already have account ?

<a href="{% url 'seller_login' %}" class="fw-bold text-decoration-none">
Login
</a>

</div>

</div>

</div>

</div>

{% endblock %}
